include: package:flutter_lints/flutter.yaml
analyzer:
  language:
    strict-inference: true
    strict-raw-types: true
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false
  errors:
    missing_required_param: error
    missing_return: error
    parameter_assignments: error
    todo: ignore

# https://dart-lang.github.io/linter/lints/
linter:
  rules:
    # Error Rules
    - always_use_package_imports
    - avoid_dynamic_calls
    # This will be obsolete under NNBD
    #- avoid_returning_null_for_future
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - comment_references
    - diagnostic_describe_all_properties
    - invariant_booleans # experimental
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    # use always_use_package_imports
    #- prefer_relative_imports
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_statements
    - unsafe_html
    - use_build_context_synchronously # Need to consider https://dart-lang.github.io/linter/lints/use_build_context_synchronously.html

    # Style Rules
    - always_declare_return_types
    - always_put_control_body_on_new_line
    - always_put_required_named_parameters_first
    # use avoid_types_on_closure_parameters, omit_local_variable_types
    #- always_specify_types
    - avoid_annotating_with_dynamic
    - avoid_bool_literals_in_conditional_expressions
    - avoid_catches_without_on_clauses
    - avoid_catching_errors
    - avoid_classes_with_only_static_members
    - avoid_double_and_int_checks
    - avoid_equals_and_hash_code_on_mutable_classes
    - avoid_escaping_inner_quotes
    - avoid_field_initializers_in_const_classes
    - avoid_final_parameters
    - avoid_implementing_value_types
    - avoid_js_rounded_ints
    - avoid_multiple_declarations_per_line
    - avoid_positional_boolean_parameters
    - avoid_private_typedef_functions
    - avoid_redundant_argument_values
    # This will be obsolete under NNBD
    #- avoid_returning_null
    - avoid_returning_this
    - avoid_setters_without_getters
    - avoid_types_on_closure_parameters
    - avoid_unused_constructor_parameters
    - avoid_void_async
    - cascade_invocations
    - cast_nullable_to_non_nullable # experimental
    - conditional_uri_does_not_exist
    - deprecated_consistency
    - directives_ordering
    # exclude to use --dart-define
    #- do_not_use_environment
    - eol_at_end_of_file
    - flutter_style_todos
    - join_return_with_assignment
    - leading_newlines_in_multiline_strings
    - library_private_types_in_public_api
    - lines_longer_than_80_chars
    - missing_whitespace_between_adjacent_strings
    - no_default_cases # experimental
    - no_leading_underscores_for_library_prefixes
    - no_leading_underscores_for_local_identifiers
    - no_runtimeType_toString
    - noop_primitive_operations
    - null_check_on_nullable_type_parameter # experimental
    - omit_local_variable_types
    - one_member_abstracts
    - only_throw_errors
    - package_api_docs # Need to consider https://dart-lang.github.io/linter/lints/package_api_docs.html
    - parameter_assignments
    - prefer_asserts_in_initializer_lists
    - prefer_asserts_with_message # Need to consider https://dart-lang.github.io/linter/lints/prefer_asserts_with_message.html
    - prefer_constructors_over_static_methods
    # use prefer_single_quotes
    #- prefer_double_quotes
    - prefer_expression_function_bodies # Need to consider https://dart-lang.github.io/linter/lints/prefer_expression_function_bodies.html
    - prefer_final_in_for_each
    - prefer_final_locals
    # use avoid_final_parameters
    #- prefer_final_parameters
    - prefer_foreach
    - prefer_if_elements_to_conditional_expressions
    - prefer_int_literals
    - prefer_interpolation_to_compose_strings
    - prefer_mixin
    - prefer_null_aware_method_calls
    - prefer_single_quotes
    - public_member_api_docs # Need to consider https://dart-lang.github.io/linter/lints/public_member_api_docs.html
    - require_trailing_commas # experimental
    - sized_box_shrink_expand
    - sort_child_properties_last
    - sort_constructors_first
    - sort_unnamed_constructors_first
    - tighten_type_of_initializing_formals
    - type_annotate_public_apis
    - unawaited_futures
    - unnecessary_await_in_return
    - unnecessary_constructor_name
    # use prefer_final_locals
    #- unnecessary_final
    - unnecessary_lambdas
    - unnecessary_late
    - unnecessary_null_aware_assignments
    - unnecessary_null_checks # experimental
    - unnecessary_nullable_for_final_variable_declarations # experimental
    - unnecessary_parenthesis
    - unnecessary_raw_strings
    - use_decorated_box
    - use_if_null_to_convert_nulls_to_bools # Need to consider https://dart-lang.github.io/linter/lints/use_if_null_to_convert_nulls_to_bools.html
    - use_is_even_rather_than_modulo
    - use_late_for_private_fields_and_variables # experimental
    - use_named_constants
    - use_raw_strings
    - use_setters_to_change_properties
    - use_string_buffers
    - use_test_throws_matchers
    - use_to_and_as_if_applicable

    # Pub Rules
    - depend_on_referenced_packages
    - secure_pubspec_urls
    - sort_pub_dependencies
